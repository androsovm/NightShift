sources:
- type: yaml
limits:
  max_tasks_per_run: 3
  task_timeout_minutes: 30
  max_files_changed: 15
  max_lines_changed: 500
tasks:
- id: add-py-typed
  title: Add py.typed marker
  status: done
  pr_url: https://github.com/androsovm/NightShift/pull/5
- id: add-storage-tests
  title: Add unit tests for storage/store.py
  status: done
  pr_url: https://github.com/androsovm/NightShift/pull/6
- id: fix-store-corruption-handling
  title: Handle corrupted JSON in storage module
  intent: 'storage/store.py functions load_run(), load_latest_run(), and load_runs()

    call RunResult.model_validate_json() without try/except. If a JSON file is

    corrupted or has schema changes, commands like `nightshift log` and

    `nightshift status` crash with ValidationError or JSONDecodeError.


    Fix all three functions:

    - load_run(): wrap in try/except, return None on error, log warning

    - load_latest_run(): skip corrupted files, try next most recent

    - load_runs(): skip corrupted files, log warning, continue loading others


    Add tests in tests/test_storage/test_store.py:

    - test_load_run_corrupted_json: write invalid JSON, verify returns None

    - test_load_latest_run_skips_corrupted: write 2 files (1 good, 1 bad), verify
    returns good one

    - test_load_runs_skips_corrupted: write 3 files (2 good, 1 bad), verify returns
    2

    '
  scope:
  - src/nightshift/storage/store.py
  - tests/test_storage/test_store.py
  priority: high
  status: done
  constraints:
  - Use structlog for warning messages
  - Do not change function signatures
  - Do not create new files, only modify existing ones
  - "tests/test_storage/test_store.py already exists \u2014 add new test classes to\
    \ it"
  pr_url: https://github.com/androsovm/NightShift/pull/9
- id: fix-max-prs-enforcement
  title: Enforce max_prs_per_night limit in runner
  intent: "GlobalConfig.max_prs_per_night is defined but never enforced.\nThe runner\
    \ can create unlimited PRs in a single run.\n\nIn executor/runner.py, add a counter\
    \ that tracks total PRs created\nacross all projects. Before calling push_branch/create_pr,\
    \ check\nif the limit is reached. If so, skip remaining tasks with status \"skipped\"\
    \nand log a warning.\n\nAdd tests in tests/test_executor/test_runner.py (create\
    \ this file):\n- test_max_prs_limit_stops_execution: mock all git/claude operations,\n\
    \  set max_prs_per_night=1, run with 3 tasks, verify only 1 gets PR,\n  others\
    \ get status \"skipped\"\n- test_max_prs_default_allows_ten: verify default limit\
    \ is 10\n"
  scope:
  - src/nightshift/executor/runner.py
  - tests/test_executor/test_runner.py
  priority: high
  status: done
  constraints:
  - Do not change function signatures of execute_run()
  - Pass the limit via global_config which is already available
  - Skipped tasks should have error="max_prs_per_night limit reached"
  - Use unittest.mock to mock git_ops and claude functions in tests
  pr_url: https://github.com/androsovm/NightShift/pull/10
- id: fix-asyncio-run-in-loop
  title: Fix unsafe asyncio.run() calls in dry-run
  intent: "cli/run_cmd.py _dry_run() calls asyncio.run() inside a for loop\n(once\
    \ per source adapter). This creates and destroys event loops\nrepeatedly, which\
    \ is inefficient and can cause issues.\n\nRefactor _dry_run() to collect all async\
    \ work and run it in a single\nasyncio.run() call. Create an async helper function\
    \ that does the\nsource fetching loop, then call asyncio.run() once on it.\n\n\
    Also fix the live run path \u2014 it also calls asyncio.run(execute_run(...))\n\
    which is fine (single call), but wrap it in a try/except for\nRuntimeError(\"\
    This event loop is already running\") with a fallback\nusing asyncio.get_event_loop().run_until_complete()\
    \ for environments\nwhere a loop is already active (e.g., Jupyter).\n"
  scope:
  - src/nightshift/cli/run_cmd.py
  priority: medium
  status: pending
  constraints:
  - Do not change the user-facing behavior
  - Do not change function signatures
  - "Keep the code simple \u2014 no need for complex async patterns"
- id: add-retry-logic-claude
  title: Add retry with backoff for Claude API errors
  status: done
  pr_url: https://github.com/androsovm/NightShift/pull/8
- id: add-git-network-resilience
  title: Add error handling for git network failures
  intent: "executor/git_ops.py prepare_repo() calls fetch/checkout/pull with no\n\
    error handling. Network failures crash the entire project processing.\n\nMake\
    \ prepare_repo() resilient:\n- Wrap git fetch in try/except CalledProcessError\n\
    - If fetch fails, log warning and continue (work with local state)\n- If checkout\
    \ main fails, raise (this is fatal)\n- If pull fails, log warning and continue\
    \ (may be offline)\n\nAdd tests in tests/test_executor/test_git_ops.py:\n- test_prepare_repo_fetch_failure_continues:\
    \ mock fetch to raise\n  CalledProcessError, verify checkout and pull still called\n\
    - test_prepare_repo_pull_failure_continues: mock pull to raise,\n  verify no exception\
    \ propagated\n- test_prepare_repo_checkout_failure_raises: mock checkout to raise,\n\
    \  verify exception propagated\n"
  scope:
  - src/nightshift/executor/git_ops.py
  - tests/test_executor/test_git_ops.py
  priority: medium
  status: pending
  constraints:
  - Do not change the function signature of prepare_repo()
  - "tests/test_executor/test_git_ops.py already exists \u2014 add new test classes"
  - Use structlog for warning messages
- id: add-structlog-config
  title: Configure structlog with proper formatting
  intent: 'All modules use structlog.get_logger() but there is no structlog.configure()

    call anywhere. Logs output in default format with no control.


    Create src/nightshift/logging.py with a configure_logging() function:

    - Accept a `verbose: bool` parameter

    - If verbose: use structlog ConsoleRenderer with colors (dev-friendly)

    - If not verbose: use structlog JSONRenderer (machine-readable)

    - Set log level: DEBUG if verbose, INFO otherwise

    - Add timestamper and log level processors


    Call configure_logging() in cli/app.py as a Typer callback:

    - Add --verbose / -v flag to the main app

    - Call configure_logging(verbose=verbose) in the callback


    Add tests in tests/test_logging.py:

    - test_configure_verbose: call configure_logging(True), verify no errors

    - test_configure_json: call configure_logging(False), verify no errors

    '
  scope:
  - src/nightshift/logging.py
  - src/nightshift/cli/app.py
  - tests/test_logging.py
  priority: medium
  status: pending
  constraints:
  - Do not modify any other files
  - Do not add new dependencies (structlog is already installed)
  - Keep the configuration simple
- id: scope-linter-to-changed-files
  title: Run linter only on changed files instead of entire project
  intent: "quality_gates.py run_linter() runs `ruff check .` on the entire project.\n\
    If tests/ or unrelated files have lint issues, the quality gate fails\neven though\
    \ the task's changes are clean.\n\nChange run_linter() to only lint files that\
    \ changed vs main:\n1. Get list of changed files using `git diff --name-only main...HEAD`\n\
    2. Filter to only .py files\n3. If no .py files changed, return (True, \"No Python\
    \ files changed\")\n4. Run `ruff check <file1> <file2> ...` on only changed files\n\
    5. Same for flake8 if ruff not available\n\nAdd tests in tests/test_executor/test_quality_gates.py:\n\
    - test_linter_only_checks_changed_files: mock git diff to return 2 files,\n  verify\
    \ ruff is called with those specific files\n- test_linter_skips_when_no_py_files:\
    \ mock git diff to return only .md files,\n  verify linter returns True with skip\
    \ message\n"
  scope:
  - src/nightshift/executor/quality_gates.py
  - tests/test_executor/test_quality_gates.py
  priority: medium
  status: pending
  constraints:
  - Do not change the function signature of run_linter()
  - Add a project_path parameter usage for git diff
  - "tests/test_executor/test_quality_gates.py already exists \u2014 add new test\
    \ classes"
- id: add-digest-tests
  title: Add unit tests for reporting/digest.py
  intent: 'reporting/digest.py has 165 lines and zero test coverage. It formats

    run results using Rich Console, Tables, and Panels.


    Create tests/test_reporting/__init__.py and tests/test_reporting/test_digest.py.


    Test all three public functions by capturing Rich console output:

    Use `console = Console(file=StringIO())` and pass it to the functions,

    OR mock the module-level console, OR just verify no exceptions are raised

    with various inputs.


    Tests to write:

    - test_format_digest_with_results: pass sample_run_result fixture, verify no crash

    - test_format_digest_empty_results: pass RunResult with empty task_results

    - test_format_summary_passed: pass result with 1 passed task

    - test_format_summary_failed: pass result with 1 failed task

    - test_format_summary_mixed: pass result with both passed and failed

    - test_format_task_detail_passed: pass TaskResult with status=passed

    - test_format_task_detail_failed: pass TaskResult with error message

    - test_format_task_detail_with_log_file: pass TaskResult with log_file path

    - test_format_duration_seconds: verify _format_duration(30) returns "30.0s"

    - test_format_duration_minutes: verify _format_duration(150) returns "2m 30s"

    - test_format_duration_hours: verify _format_duration(7200) returns "2h 0m"

    '
  scope:
  - tests/test_reporting/__init__.py
  - tests/test_reporting/test_digest.py
  priority: medium
  status: pending
  constraints:
  - Only create test files, do not modify source code
  - Use conftest.py sample_run_result fixture where possible
  - Import _format_duration directly for unit testing
  - Create RunResult/TaskResult objects inline where needed for specific test cases
- id: add-github-source-tests
  title: Add unit tests for GitHub source adapter
  intent: "sources/github_source.py has zero test coverage. It fetches tasks from\n\
    GitHub Issues API and closes them on completion.\n\nCreate tests/test_sources/test_github_source.py\
    \ with mocked httpx responses.\n\nTests to write:\n- test_fetch_tasks_returns_issues:\
    \ mock GET /repos/owner/repo/issues\n  to return 2 issues, verify 2 Task objects\
    \ returned with correct fields\n- test_fetch_tasks_skips_pull_requests: mock response\
    \ with 1 issue + 1 PR\n  (has \"pull_request\" key), verify only 1 Task returned\n\
    - test_fetch_tasks_priority_from_labels: mock issue with \"priority:high\" label,\n\
    \  verify task.priority == \"high\"\n- test_fetch_tasks_missing_token_raises:\
    \ patch get_secret to return None,\n  verify RuntimeError raised\n- test_mark_done_closes_issue:\
    \ mock POST comment + PATCH close,\n  verify both API calls made\n- test_detect_repo_from_ssh:\
    \ mock subprocess to return\n  \"git@github.com:owner/repo.git\", verify returns\
    \ \"owner/repo\"\n- test_detect_repo_from_https: mock subprocess to return\n \
    \ \"https://github.com/owner/repo.git\", verify returns \"owner/repo\"\n\nUse\
    \ unittest.mock.patch for get_secret and httpx.AsyncClient.\nUse pytest-asyncio\
    \ for async tests.\n"
  scope:
  - tests/test_sources/test_github_source.py
  priority: medium
  status: pending
  constraints:
  - Only create test files, do not modify source code
  - "Mock all HTTP calls \u2014 never hit real GitHub API"
  - Mock get_secret to return "fake-token"
  - Use unittest.mock.AsyncMock for httpx async methods
- id: add-sleep-prevention-hint
  title: Add macOS/Linux sleep prevention guidance to install and doctor
  intent: "When NightShift runs overnight via launchd/systemd, the machine must\n\
    not sleep \u2014 otherwise the scheduler never fires. Users often miss this.\n\
    \nChanges needed:\n\n1. cli/install_cmd.py \u2014 after successful install, print\
    \ a warning panel:\n   - macOS: \"Important: Your Mac must not sleep for NightShift\
    \ to run.\n     Go to System Settings \u2192 Energy \u2192 Options \u2192 enable\
    \ 'Prevent automatic\n     sleeping when the display is off'. Or run: sudo pmset\
    \ -c disablesleep 1\"\n   - Linux: \"Important: Ensure your machine does not suspend\
    \ overnight.\n     Check your power management settings or run: systemctl mask\
    \ sleep.target suspend.target\"\n\n2. cli/doctor_cmd.py \u2014 add a new check\
    \ that detects sleep settings:\n   - macOS: run `pmset -g | grep sleep` and check\
    \ if disablesleep is 1\n     or if sleep timer is 0. If the machine will sleep,\
    \ show WARN with\n     the fix instructions.\n   - Linux: check if sleep.target\
    \ is masked via\n     `systemctl is-enabled sleep.target`. If active, show WARN.\n\
    \   - Add the check to the doctor table as \"Sleep prevention\"\n\n3. README.md\
    \ \u2014 add a \"Prerequisites\" note about sleep prevention in the\n   Scheduling\
    \ section, after the `nightshift install` description.\n"
  scope:
  - src/nightshift/cli/install_cmd.py
  - src/nightshift/cli/doctor_cmd.py
  - README.md
  priority: high
  status: done
  constraints:
  - Use Rich Panel with yellow border for the warning in install_cmd
  - Doctor check should be WARN not FAIL (not a hard blocker)
  - Keep platform detection via platform.system()
  - "Do not run sudo commands in doctor \u2014 only read/check settings"
  pr_url: https://github.com/androsovm/NightShift/pull/11
